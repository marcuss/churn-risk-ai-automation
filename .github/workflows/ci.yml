name: CI

# Deterministic quality gate — no network, no API keys. Runs on every push/PR.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install (into .venv, which pyright is configured to use)
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"
      - name: Lint (ruff)
        run: .venv/bin/ruff check .
      - name: Type check (pyright)
        run: .venv/bin/pyright
      - name: Tests (pytest)
        run: .venv/bin/pytest
